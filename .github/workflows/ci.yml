name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint-and-test:
    name: Install and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run Ruff validation
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

  deploy-pages:
    name: Deploy Hello World to GitHub Pages
    needs: lint-and-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compilar LaTeX (docs/main.tex)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: docs/pdf
          latexmk_use_xelatex: true

      - name: Create static Hello World HTML and copy PDF
        run: |
          mkdir -p public
          cp docs/pdf/main.pdf public/contribuicao-individual.pdf
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="pt-BR">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Hello World - CI/CD</title>
              <style>
                  body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
                  .container { text-align: center; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
                  h1 { color: #333; }
                  p { color: #666; }
                  a.btn { display: inline-block; margin-top: 1rem; padding: 10px 20px; text-decoration: none; color: white; background-color: #007bff; border-radius: 5px; font-weight: bold; }
                  a.btn:hover { background-color: #0056b3; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Hello World! 🚀</h1>
                  <p>Implantação gerada automaticamente via GitHub Actions.</p>
                  <p>Dependências gerenciadas com <b>uv</b> e código validado com <b>ruff</b>.</p>
                  <a href="contribuicao-individual.pdf" target="_blank" class="btn">📄 Ver Contribuição Individual (PDF)</a>
              </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
